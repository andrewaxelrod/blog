<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">Codebase to OpenSpec pipeline</title>
  <desc id="desc">A polished vertical process diagram showing Codebase flowing through Discovery, Manifest, Synthesis, and Conversion into OpenSpec outputs.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#121933"/>
    </linearGradient>

    <linearGradient id="card0" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.28"/>
    </filter>

    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#cbd5e1"/>
    </marker>

    <style>
      .title { font: 700 26px Inter, Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 15px Inter, Arial, sans-serif; fill: #94a3b8; }
      .codebase { font: 700 22px Inter, Arial, sans-serif; fill: #e2e8f0; }
      .phase { font: 700 22px Inter, Arial, sans-serif; fill: #ffffff; }
      .meta  { font: 500 16px Inter, Arial, sans-serif; fill: #e2e8f0; }
      .pill  { fill: rgba(255,255,255,0.14); stroke: rgba(255,255,255,0.22); stroke-width: 1; }
      .pillText { font: 700 13px Inter, Arial, sans-serif; fill: #ffffff; letter-spacing: .08em; }
      .connector { stroke: #cbd5e1; stroke-width: 4; fill: none; marker-end: url(#arrow); opacity: 0.95; }
      .outline { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1080" height="620" fill="url(#bg)"/>
  <rect x="22" y="22" width="1036" height="576" rx="24" class="outline"/>

  <text x="540" y="48" text-anchor="middle" class="title">Codebase → OpenSpec pipeline</text>
  <text x="540" y="72" text-anchor="middle" class="subtitle">Discovery artifacts feed a manifest, which drives per-domain synthesis and final spec conversion.</text>

  <rect x="430" y="96" width="220" height="52" rx="16" fill="#111827" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
  <text x="540" y="129" text-anchor="middle" class="codebase">Codebase</text>

  <path d="M540 148 L540 182" class="connector"/>
  <path d="M540 246 L540 280" class="connector"/>
  <path d="M540 344 L540 378" class="connector"/>
  <path d="M540 442 L540 476" class="connector"/>

  <g filter="url(#shadow)">
    <rect x="120" y="182" width="840" height="64" rx="20" fill="url(#card0)"/>
  </g>
  <rect x="144" y="198" width="102" height="30" rx="15" class="pill"/>
  <text x="195" y="218" text-anchor="middle" class="pillText">PHASE 0</text>
  <text x="270" y="221" class="phase">Discovery</text>
  <text x="445" y="221" class="meta">domain-map.md, file-index.md</text>

  <g filter="url(#shadow)">
    <rect x="120" y="280" width="840" height="64" rx="20" fill="url(#card1)"/>
  </g>
  <rect x="144" y="296" width="102" height="30" rx="15" class="pill"/>
  <text x="195" y="316" text-anchor="middle" class="pillText">PHASE 1</text>
  <text x="270" y="319" class="phase">Manifest</text>
  <text x="420" y="319" class="meta">MANIFEST.md (routing + phasing)</text>

  <g filter="url(#shadow)">
    <rect x="120" y="378" width="840" height="64" rx="20" fill="url(#card2)"/>
  </g>
  <rect x="144" y="394" width="102" height="30" rx="15" class="pill"/>
  <text x="195" y="414" text-anchor="middle" class="pillText">PHASE 2</text>
  <text x="270" y="417" class="phase">Synthesis</text>
  <text x="430" y="417" class="meta">intermediate/&lt;domain&gt;.md (one per domain)</text>

  <g filter="url(#shadow)">
    <rect x="120" y="476" width="840" height="64" rx="20" fill="url(#card3)"/>
  </g>
  <rect x="144" y="492" width="102" height="30" rx="15" class="pill"/>
  <text x="195" y="512" text-anchor="middle" class="pillText">PHASE 3</text>
  <text x="270" y="515" class="phase">Conversion</text>
  <text x="445" y="515" class="meta">openspec/specs/&lt;domain&gt;/spec.md</text>
</svg>